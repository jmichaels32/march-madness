name: Update Scores from Kalshi

on:
  # Run every 3 minutes during tournament game windows (noon-1am ET, Mar-Apr)
  schedule:
    - cron: '*/3 16-23,0-5 * 3-4 *'  # UTC: 4pm-5am = noon-1am ET
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.fetch.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Fetch scores from Kalshi
        id: fetch
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python scripts/update_scores.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json
          git commit -m "Update game scores from Kalshi"
          git push

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: git pull origin main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
