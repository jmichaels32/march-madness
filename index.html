<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness 2026 — Family Bracket Challenge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>MARCH MADNESS 2026</h1>
    <div class="subtitle">Family Bracket Challenge</div>
  </header>

  <div class="legend" id="legend"></div>

  <div class="bracket-wrapper">
    <div class="scroll-hint" id="scroll-hint">Swipe to scroll bracket &rarr;</div>
    <div class="bracket" id="bracket"></div>
  </div>

  <section class="leaderboard" id="leaderboard-section">
    <h2>Leaderboard</h2>
    <div class="last-updated" id="last-updated"></div>
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th class="r-align">R1</th>
          <th class="r-align">R2</th>
          <th class="r-align">S16</th>
          <th class="r-align">E8</th>
          <th class="r-align">F4</th>
          <th class="r-align">Ch</th>
          <th class="r-align">Total</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </section>

  <a href="dev.html" class="dev-link">Dev Editor</a>
  <script src="app.js"></script>
</body>
</html>
